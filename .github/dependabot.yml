version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "05:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    # Keep the supported Ubuntu release stable while still accepting digest
    # refreshes for the existing 24.04 tag.
    ignore:
      - dependency-name: ubuntu
        versions:
          - "> 24.04"
