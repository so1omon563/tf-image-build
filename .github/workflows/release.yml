name: Release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_version }}
      release_requested: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Bump version and push tag
        id: version
        uses: so1omon563/custom-semver-bumper@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_marker: "#release #publish #ship"

  # Failed-job retries must reuse the completed bump instead of creating a new tag.
  publish-release:
    needs: bump-version
    if: needs.bump-version.outputs.release_requested == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Find previous release
        id: previous-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: so1omon563/release-creator@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.bump-version.outputs.new_tag }}
          from-tag: ${{ steps.previous-release.outputs.tag }}
          tag-prefix: v
          notes-format: grouped
          skip-if-release-exists: 'true'

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image
          tags: |
            type=raw,value=${{ needs.bump-version.outputs.new_tag }}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/tf_image:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/tf_image:buildcache,mode=max
