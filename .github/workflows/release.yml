name: Release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_version }}
      release_requested: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Bump version and push tag
        id: version
        uses: so1omon563/custom-semver-bumper@v1.0.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_marker: "#release #publish #ship"

  validate-release:
    name: Validate release (linux/${{ matrix.arch }})
    needs: bump-version
    if: needs.bump-version.outputs.release_requested == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build release candidate
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          pull: true
          no-cache: true
          load: true
          tags: tf-image-build:release-candidate-${{ matrix.arch }}
          cache-from: type=gha,scope=release-validation-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-validation-${{ matrix.arch }},ignore-error=true

      - name: Test release candidate
        run: tests/test-image.sh tf-image-build:release-candidate-${{ matrix.arch }} ${{ matrix.arch }}

      - name: Scan OS and application packages
        run: scripts/scan-image tf-image-build:release-candidate-${{ matrix.arch }} trivy-release-${{ matrix.arch }}.json

      - name: Retain vulnerability report
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: trivy-release-${{ matrix.arch }}
          path: trivy-release-${{ matrix.arch }}.json
          if-no-files-found: error
          retention-days: 90

  # Failed-job retries must reuse the completed bump and validated candidate.
  publish-release:
    needs:
      - bump-version
      - validate-release
    if: needs.bump-version.outputs.release_requested == 'true' && needs.validate-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Find previous release
        id: previous-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: so1omon563/release-creator@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.bump-version.outputs.new_tag }}
          from-tag: ${{ steps.previous-release.outputs.tag }}
          tag-prefix: v
          notes-format: grouped
          skip-if-release-exists: 'true'

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image
          tags: |
            type=raw,value=${{ needs.bump-version.outputs.new_tag }}
            type=raw,value=latest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/tf_image:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/tf_image:buildcache,mode=max
