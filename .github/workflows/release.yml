name: Release

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.version.outputs.new_version }}
      release_requested: ${{ steps.release-intent.outputs.requested }}
    steps:
      - name: Bump version and push tag
        id: version
        uses: so1omon563/custom-semver-bumper@v1.0.2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_marker: "#release #publish #ship"

      - name: Resolve release intent
        id: release-intent
        env:
          BUMPER_REQUESTED: ${{ steps.version.outputs.should_release }}
          NEW_TAG: ${{ steps.version.outputs.new_version }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          requested="${BUMPER_REQUESTED}"
          if [[ -n "${NEW_TAG}" ]]; then
            if printf '%s\n' "${PR_TITLE}" |
              grep -Eiq '(^|[[:space:]])#(release|publish|ship)([[:space:]]|$)'
            then
              requested=true
            fi
          fi
          echo "requested=${requested}" >> "${GITHUB_OUTPUT}"

  validate-release:
    name: Validate release (linux/${{ matrix.arch }})
    needs: bump-version
    if: needs.bump-version.outputs.release_requested == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image
          tags: |
            type=raw,value=${{ needs.bump-version.outputs.new_tag }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push release candidate by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          pull: true
          no-cache: true
          outputs: type=image,name=${{ secrets.DOCKER_HUB_USERNAME }}/tf_image,push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=release-validation-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=release-validation-${{ matrix.arch }},ignore-error=true

      - name: Logout from Docker Hub
        if: ${{ always() }}
        run: docker logout

      - name: Pull exact release candidate
        env:
          RELEASE_CANDIDATE: ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image@${{ steps.build.outputs.digest }}
        run: docker pull "${RELEASE_CANDIDATE}"

      - name: Test release candidate
        env:
          RELEASE_CANDIDATE: ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image@${{ steps.build.outputs.digest }}
        run: tests/test-image.sh "${RELEASE_CANDIDATE}" ${{ matrix.arch }}

      - name: Scan OS and application packages
        env:
          RELEASE_CANDIDATE: ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image@${{ steps.build.outputs.digest }}
        run: scripts/scan-image "${RELEASE_CANDIDATE}" trivy-release-${{ matrix.arch }}.json

      - name: Record validated release digest
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: printf '%s\n' "${IMAGE_DIGEST}" > release-candidate-${{ matrix.arch }}.digest

      - name: Retain validated release digest
        uses: actions/upload-artifact@v6
        with:
          name: release-candidate-${{ matrix.arch }}
          path: release-candidate-${{ matrix.arch }}.digest
          if-no-files-found: error
          retention-days: 90

      - name: Retain vulnerability report
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: trivy-release-${{ matrix.arch }}
          path: trivy-release-${{ matrix.arch }}.json
          if-no-files-found: error
          retention-days: 90

  # Failed-job retries must reuse the completed bump and validated candidate.
  publish-release:
    needs:
      - bump-version
      - validate-release
    if: needs.bump-version.outputs.release_requested == 'true' && needs.validate-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download validated release digests
        uses: actions/download-artifact@v8
        with:
          pattern: release-candidate-*
          path: release-candidates
          merge-multiple: true

      - name: Find previous release
        id: previous-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // ""')"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish validated multi-architecture image
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image
          VERSION_TAG: ${{ needs.bump-version.outputs.new_tag }}
        run: |
          amd64_digest="$(cat release-candidates/release-candidate-amd64.digest)"
          arm64_digest="$(cat release-candidates/release-candidate-arm64.digest)"
          for digest in "${amd64_digest}" "${arm64_digest}"; do
            if [[ ! "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "invalid release candidate digest: ${digest}" >&2
              exit 1
            fi
          done
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${VERSION_TAG}" \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}@${amd64_digest}" \
            "${IMAGE_NAME}@${arm64_digest}"

      - name: Verify published manifests and attestations
        env:
          IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/tf_image
          VERSION_TAG: ${{ needs.bump-version.outputs.new_tag }}
        run: |
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION_TAG}" --raw > release-index.json
          docker buildx imagetools inspect "${IMAGE_NAME}:latest" --raw > latest-index.json
          cmp release-index.json latest-index.json
          for arch in amd64 arm64; do
            jq -e --arg arch "${arch}" \
              '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == $arch)] | length == 1' \
              release-index.json
          done
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION_TAG}" \
            --format '{{json .SBOM}}' > release-sbom.json
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION_TAG}" \
            --format '{{json .Provenance}}' > release-provenance.json
          jq -e 'has("linux/amd64") and has("linux/arm64")' release-sbom.json
          jq -e 'has("linux/amd64") and has("linux/arm64")' release-provenance.json

      - name: Logout from Docker Hub
        if: ${{ always() }}
        run: docker logout

      - name: Create GitHub release
        uses: so1omon563/release-creator@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.bump-version.outputs.new_tag }}
          from-tag: ${{ steps.previous-release.outputs.tag }}
          tag-prefix: v
          notes-format: grouped
          skip-if-release-exists: 'true'
