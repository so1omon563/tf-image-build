name: Image CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and smoke test (linux/amd64)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: tf-image-build:ci-amd64
          cache-from: type=gha,scope=image-ci-amd64
          cache-to: type=gha,mode=max,scope=image-ci-amd64,ignore-error=true

      - name: Smoke test tool inventory
        run: |
          docker run --rm \
            --platform linux/amd64 \
            --volume "$PWD/tests:/tests:ro" \
            tf-image-build:ci-amd64 \
            /tests/smoke-tool-inventory.sh
