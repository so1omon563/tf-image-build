name: Image CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

      - name: Lint shell scripts
        run: shellcheck --severity=warning example_usage/tf_image scripts/* tests/*.sh

      - name: Test Python contracts
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Test pinned build inputs
        run: |
          tests/test-build-inputs.sh
          tests/test-download-verification.sh

      - name: Lint Dockerfile
        run: |
          docker run --rm -i \
            --volume "$PWD:/work:ro" \
            hadolint/hadolint:v2.14.0 \
            hadolint --config /work/.hadolint.yaml - < Dockerfile

  build:
    name: Build and smoke test (linux/${{ matrix.arch }})
    needs: static
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          load: true
          tags: tf-image-build:ci-${{ matrix.arch }}
          cache-from: type=gha,scope=image-ci-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=image-ci-${{ matrix.arch }},ignore-error=true

      - name: Test image contract
        run: tests/test-image.sh tf-image-build:ci-${{ matrix.arch }} ${{ matrix.arch }}
