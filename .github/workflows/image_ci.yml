name: Image CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and smoke test (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          tags: tf-image-build:ci-${{ matrix.suffix }}
          cache-from: type=gha,scope=image-ci-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=image-ci-${{ matrix.suffix }},ignore-error=true

      - name: Smoke test tool inventory
        run: |
          docker run --rm \
            --platform "${{ matrix.platform }}" \
            --volume "$PWD/tests:/tests:ro" \
            "tf-image-build:ci-${{ matrix.suffix }}" \
            /tests/smoke-tool-inventory.sh
